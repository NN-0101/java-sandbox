  basic:
    # 基础连接池配置
    max-active: 20
    min-idle: 5
    initial-size: 1                    # 降低初始连接数，加快启动

    # 连接等待配置
    max-wait: 10000

    # 连接泄漏检测 - 生产环境关闭
    remove-abandoned: false             # 关键：关闭removeAbandoned
    remove-abandoned-timeout: 1800
    log-abandoned: false

    # 空闲连接检查
    time-between-eviction-runs-millis: 60000
    min-evictable-idle-time-millis: 300000

    # 连接测试配置 - 优化启动速度
    validation-query: SELECT 1
    test-while-idle: true
    test-on-borrow: false                # 关闭borrow时测试
    test-on-return: false                # 关闭return时测试

